<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Smart Surveillance Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🛡 Smart Surveillance System</h1>
        <p>Real-time Anomaly Detection Dashboard</p>
    </header>

    <section class="status">
        <span class="dot"></span>
        <span>System Status: RUNNING</span>
    </section>

    <section class="upload-section" style="text-align: center; padding: 20px;">
        <input type="file" id="videoUpload" accept="video/*">
        <button onclick="uploadVideo()"
            style="padding: 10px 20px; cursor: pointer; background: #38bdf8; border: none; border-radius: 5px; color: #020617; font-weight: bold;">Upload
            & Detect</button>
        <div id="uploadStatus" style="margin-top: 10px; color: #cbd5f5;"></div>
    </section>

    <section class="video-container" style="text-align: center; padding: 20px; display: none;" id="videoContainer">
        <h3 style="color: #38bdf8; margin-bottom: 10px;">Live Anomaly Detection Feed</h3>
        <video id="resultVideo" controls
            style="width: 80%; max-width: 800px; border: 2px solid #38bdf8; border-radius: 10px; margin: 0 auto;"></video>
    </section>

    <main class="alerts-container" id="alertsContainer">
        <!-- Alerts injected by JS -->
    </main>

    <footer>
        <p>© 2026 Smart Surveillance | AI Powered Security</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
